<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <title>Login - Kinetic Studio</title>
</head>

<body class="bg-off-white">
    <!-- Floating Top-Right Controls -->
    <div class="position-fixed top-0 end-0 p-4 z-3 d-flex gap-2">
        <button class="btn-toggle-tactile" id="theme-toggle" aria-label="Toggle theme">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="btn-toggle-tactile text-btn" id="rtl-toggle" aria-label="Toggle RTL">
            RTL
        </button>
    </div>

    <main class="d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5 col-xl-4 reveal-item">
                    <div class="tactile-card p-4 p-sm-5 text-center position-relative">
                        <!-- Logo -->
                        <div class="mb-4">
                            <a href="index.html" class="text-decoration-none text-charcoal">
                                <img src="assets/images/logo.svg" alt="Kinetic Studio Logo" height="50">
                            </a>
                        </div>

                        <h2 class="display-5 fw-bold mb-5">Welcome Back</h2>

                        <form>
                            <!-- Email -->
                            <div class="mb-3 text-start">
                                <label class="form-label small opacity-75 fw-bold">Email Address</label>
                                <input type="email" class="form-control px-3 py-2"
                                    style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-radius: 0.8rem;"
                                    required>
                            </div>

                            <!-- Password -->
                            <div class="mb-3 text-start">
                                <label class="form-label small opacity-75 fw-bold">Password</label>
                                <div class="input-group">
                                    <input type="password" id="login-password" class="form-control px-3 py-2"
                                        style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-right: none; border-radius: 0.8rem 0 0 0.8rem;"
                                        required>
                                    <button class="btn px-3 py-2" type="button" id="toggle-password"
                                        style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-left: none; border-radius: 0 0.8rem 0.8rem 0;">
                                        <i class="bi bi-eye-slash text-muted" id="toggle-icon"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Remember & Forgot -->
                            <div class="d-flex justify-content-between align-items-center mb-4 small">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label opacity-75" for="rememberMe"
                                        style="cursor: pointer;">
                                        Remember me
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none fw-bold auth-link"
                                    style="color: var(--color-terracotta);">Forgot Password?</a>
                            </div>

                            <!-- Login Button -->
                            <button type="submit" class="btn-tactile w-100 py-3 mb-4">Login</button>

                            <!-- Divider -->
                            <div class="d-flex align-items-center mb-4">
                                <div class="flex-grow-1 border-top opacity-25"></div>
                                <span class="px-3 small text-muted fw-semibold">OR</span>
                                <div class="flex-grow-1 border-top opacity-25"></div>
                            </div>

                            <!-- Social Logins -->
                            <div class="d-flex gap-2 justify-content-center mb-4">
                                <button type="button"
                                    class="btn btn-outline-secondary w-50 py-2 d-flex align-items-center justify-content-center gap-2"
                                    style="border-radius: 0.8rem;">
                                    <i class="bi bi-google text-danger"></i> <span
                                        class="small fw-semibold">Google</span>
                                </button>
                                <button type="button"
                                    class="btn btn-outline-secondary w-50 py-2 d-flex align-items-center justify-content-center gap-2"
                                    style="border-radius: 0.8rem;">
                                    <i class="bi bi-apple text-charcoal"></i> <span
                                        class="small fw-semibold">Apple</span>
                                </button>
                            </div>

                            <!-- Sign Up Link -->
                            <p class="small text-muted mb-0">Don't have an account? <a href="register.html"
                                    class="fw-bold text-decoration-none auth-link"
                                    style="color: var(--color-terracotta);">Sign Up</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Password Visibility Toggle
        document.getElementById('toggle-password').addEventListener('click', function (e) {
            const passwordInput = document.getElementById('login-password');
            const toggleIcon = document.getElementById('toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            }
        });
    </script>
</body>

</html>
