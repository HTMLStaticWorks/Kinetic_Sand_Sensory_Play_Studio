<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <title>Register - Kinetic Studio</title>
</head>

<body class="bg-off-white">
    <!-- Floating Top-Right Controls -->
    <div class="position-fixed top-0 end-0 p-4 z-3 d-flex gap-2">
        <button class="btn-toggle-tactile" id="theme-toggle" aria-label="Toggle theme">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="btn-toggle-tactile text-btn" id="rtl-toggle" aria-label="Toggle RTL">
            RTL
        </button>
    </div>

    <main class="d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-4 reveal-item">
                    <div class="tactile-card p-4 p-sm-5 text-center position-relative">
                        <!-- Logo -->
                        <div class="mb-4">
                            <a href="index.html" class="text-decoration-none text-charcoal">
                                <img src="assets/images/logo.svg" alt="Kinetic Studio Logo" height="50">
                            </a>
                        </div>

                        <h2 class="display-5 fw-bold mb-5">Create Account</h2>

                        <form>
                            <!-- Full Name -->
                            <div class="mb-3 text-start">
                                <label class="form-label small opacity-75 fw-bold">Full Name</label>
                                <input type="text" class="form-control px-3 py-2"
                                    style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-radius: 0.8rem;"
                                    required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3 text-start">
                                <label class="form-label small opacity-75 fw-bold">Email Address</label>
                                <input type="email" class="form-control px-3 py-2"
                                    style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-radius: 0.8rem;"
                                    required>
                            </div>

                            <!-- Password -->
                            <div class="mb-3 text-start">
                                <label class="form-label small opacity-75 fw-bold">Password</label>
                                <div class="input-group">
                                    <input type="password" id="register-password" class="form-control px-3 py-2"
                                        style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-right: none; border-radius: 0.8rem 0 0 0.8rem;"
                                        required>
                                    <button class="btn px-3 toggle-password-btn py-2" type="button"
                                        data-target="register-password"
                                        style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-left: none; border-radius: 0 0.8rem 0.8rem 0;">
                                        <i class="bi bi-eye-slash text-muted"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3 text-start">
                                <label class="form-label small opacity-75 fw-bold">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" id="confirm-password" class="form-control px-3 py-2"
                                        style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-right: none; border-radius: 0.8rem 0 0 0.8rem;"
                                        required>
                                    <button class="btn px-3 toggle-password-btn py-2" type="button"
                                        data-target="confirm-password"
                                        style="background: rgba(var(--color-charcoal-rgb), 0.03); border: 0.5px solid rgba(var(--color-charcoal-rgb), 0.2); border-left: none; border-radius: 0 0.8rem 0.8rem 0;">
                                        <i class="bi bi-eye-slash text-muted"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Terms and Conditions -->
                            <div class="mb-3 text-start d-flex align-items-center gap-2">
                                <input type="checkbox" id="terms" class="form-check-input mt-0" required
                                    style="cursor: pointer; width: 1.1rem; height: 1.1rem; border-radius: 4px; border: 1px solid rgba(var(--color-charcoal-rgb), 0.2);">
                                <label for="terms" class="small text-muted mb-0" style="cursor: pointer;">
                                    I agree to the <a href="#" class="terms-link fw-bold text-decoration-none">Terms and
                                        Conditions</a>
                                </label>
                            </div>

                            <!-- Register Button -->
                            <button type="submit" class="btn-tactile w-100 py-3 mb-4 mt-2">Sign Up</button>

                            <!-- Divider -->
                            <div class="d-flex align-items-center mb-4">
                                <div class="flex-grow-1 border-top opacity-25"></div>
                                <span class="px-3 small text-muted fw-semibold">OR</span>
                                <div class="flex-grow-1 border-top opacity-25"></div>
                            </div>

                            <!-- Social Logins -->
                            <div class="d-flex gap-2 justify-content-center mb-4">
                                <button type="button"
                                    class="btn btn-outline-secondary w-50 py-2 d-flex align-items-center justify-content-center gap-2"
                                    style="border-radius: 0.8rem;">
                                    <i class="bi bi-google text-danger"></i> <span
                                        class="small fw-semibold">Google</span>
                                </button>
                                <button type="button"
                                    class="btn btn-outline-secondary w-50 py-2 d-flex align-items-center justify-content-center gap-2"
                                    style="border-radius: 0.8rem;">
                                    <i class="bi bi-apple text-charcoal"></i> <span
                                        class="small fw-semibold">Apple</span>
                                </button>
                            </div>

                            <!-- Login Link -->
                            <p class="small text-muted mb-0">Already have an account? <a href="login.html"
                                    class="fw-bold text-decoration-none auth-link"
                                    style="color: var(--color-terracotta);">Login</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Password Visibility Toggles
        document.querySelectorAll('.toggle-password-btn').forEach(button => {
            button.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                const toggleIcon = this.querySelector('i');

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.replace('bi-eye-slash', 'bi-eye');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.replace('bi-eye', 'bi-eye-slash');
                }
            });
        });
    </script>
</body>

</html>
